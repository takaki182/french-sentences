<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French Cards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: sans-serif;
    background: #111;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }

  header {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  header a { color: #888; font-size: 13px; text-decoration: none; }
  header a:hover { color: #fff; }

  .session-stats {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
  }

  .stat-pill {
    flex: 1;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 8px;
    text-align: center;
    font-size: 11px;
    color: #888;
  }

  .stat-pill strong {
    display: block;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 2px;
  }

  .stat-pill.new strong { color: #4a9eff; }
  .stat-pill.due strong { color: #ff9f43; }
  .stat-pill.done strong { color: #4caf50; }

  .progress-bar {
    width: 100%;
    max-width: 480px;
    height: 3px;
    background: #333;
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: #4caf50;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Card scene */
  .scene {
    width: 100%;
    max-width: 480px;
    height: 420px;
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 20px;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  /* Front face */
  .front {
    background: #1a1a1a;
    border: 1px solid #333;
  }

  .front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 16px;
    display: block;
  }

  .front .img-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.7) 100%);
    border-radius: 16px;
  }

  .front .tap-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.4);
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .front .speak-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    background: rgba(0,0,0,0.5);
    border: none;
    color: #fff;
    font-size: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    transition: background 0.2s;
  }

  .front .speak-btn:hover { background: rgba(0,0,0,0.75); }
  .front .speak-btn.speaking { background: #0055cc; }

  .img-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #555;
    font-size: 13px;
  }

  /* Back face */
  .back {
    background: #1a1a1a;
    border: 1px solid #333;
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
  }

  .back img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 16px 16px 0 0;
    display: block;
    flex-shrink: 0;
  }

  .back .text-area {
    flex: 1;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
  }

  .back .french {
    font-size: 19px;
    font-weight: bold;
    color: #fff;
    line-height: 1.35;
  }

  .back .english {
    font-size: 13px;
    color: #aaa;
    line-height: 1.4;
  }

  /* Anki rating buttons */
  .anki-btns {
    display: flex;
    gap: 8px;
    padding: 0 16px 16px;
  }

  .anki-btns button {
    flex: 1;
    padding: 10px 6px;
    border-radius: 8px;
    border: none;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    line-height: 1.2;
  }

  .anki-btns button:hover { opacity: 0.85; }
  .anki-btns button span.interval { font-size: 10px; font-weight: normal; opacity: 0.8; }

  .btn-again { background: #c0392b; color: #fff; }
  .btn-good  { background: #4caf50; color: #fff; }
  .btn-easy  { background: #4a9eff; color: #fff; }

  /* Loading screen */
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #666;
    font-size: 13px;
    padding: 60px 0;
    width: 100%;
    max-width: 480px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #333;
    border-top-color: #4caf50;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Done screen */
  .done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
    width: 100%;
    max-width: 480px;
    gap: 12px;
  }

  .done-screen h2 { font-size: 26px; }
  .done-screen p { color: #888; font-size: 14px; }
  .done-screen button {
    margin-top: 8px;
    padding: 10px 28px;
    background: #4caf50;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
</style>
</head>

<header>
  <a href="index.html">← Back to list</a>

</div>

</div>

<div class="loading-screen" id="loading-screen">

</div>

<div class="scene" id="scene" style="display:none" onclick="flipCard()">
  <div class="card" id="card">
    <div class="face front" id="front">

      </div>

      <div class="img-overlay" id="overlay" style="display:none"></div>

      <button class="speak-btn" id="speak-btn" onclick="event.stopPropagation(); speak()">🔊</button>
    </div>
    <div class="face back">
      <img id="back-img" src="" alt="">
      <div class="text-area">
        <div class="french" id="back-french"></div>
        <div class="english" id="back-english"></div>
      </div>
      <div class="anki-btns">

        </button>
        <button class="btn-good" onclick="event.stopPropagation(); rate('good')">

        </button>
        <button class="btn-easy" onclick="event.stopPropagation(); rate('easy')">

        </button>
      </div>
    </div>
  </div>
</div>

<div class="done-screen" id="done-screen">

  <h2>Session complete!</h2>
  <p id="done-msg"></p>
  <button onclick="restartSession()">Study again</button>
  <a href="index.html" style="color:#888;font-size:13px;margin-top:4px">Back to list</a>
</div>

// ── Helpers ───────────────────────────────────────────────
function toSlug(en) {
  return en.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim().replace(/\s+/g, '_');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function fmtInterval(days) {
  if (days < 1) return '< 1d';
  if (days === 1) return '1 day';
  if (days < 30) return `${days}d`;
  if (days < 365) return `${Math.round(days / 30)}mo`;
  return `${Math.round(days / 365)}yr`;
}

// ── Anki SRS ──────────────────────────────────────────────
function loadAnki() {
  try { return JSON.parse(localStorage.getItem(ANKI_KEY)) || {}; } catch { return {}; }
}

function saveAnki(d) { localStorage.setItem(ANKI_KEY, JSON.stringify(d)); }

function getCard(id) {
  return loadAnki()[id] || { interval: 0, ease: 2.5, due: 0 };
}

function calcNext(id, rating) {
  const c = getCard(id);
  const now = Date.now();
  let { interval, ease } = c;

  if (rating === 'again') {
    interval = 0;
    ease = Math.max(1.3, ease - 0.2);
    return { interval, ease, due: now }; // re-queue immediately
  } else if (rating === 'good') {
    if (interval < 1) {
      // New card — due again in 10 minutes
      return { interval: 10 / 1440, ease, due: now + 10 * 60 * 1000 };
    }
    interval = Math.round(interval * 1.8);
  } else { // easy
    if (interval < 1) {
      interval = 1; // 1 day
    } else {
      interval = Math.round(interval * 2.5);
    }
    ease = Math.min(3.0, ease + 0.1);
  }

  return { interval, ease, due: now + interval * DAY };
}

function previewIntervals(id) {
  const c = getCard(id);
  const isNew = c.interval < 1;
  return {
    again: 0,
    good:  isNew ? 0 : calcNext(id, 'good').interval,
    easy:  isNew ? 1 : calcNext(id, 'easy').interval,
    isNew,
  };
}

// ── Image detection ───────────────────────────────────────
function checkImage(s) {
  return new Promise(resolve => {
    const tryExt = (ext, fallback) => {
      const img = new Image();
      img.onload = () => resolve({ sentence: s, src: img.src });
      img.onerror = fallback;
      img.src = `images/${toSlug(s.en)}.${ext}`;
    };
    tryExt('png', () => tryExt('jpg', () => resolve(null)));
  });
}

async function detectAvailable() {
  const results = await Promise.all(SENTENCES.map(checkImage));
  return results.filter(Boolean);
}

// ── Session queue ─────────────────────────────────────────
let queue = [];       // cards to show this session (shuffled due cards first)
let sessionDone = 0;
let againQueue = [];  // cards marked "again" go here for re-review
let current = null;
let availableMap = {}; // id → src

function buildQueue(available) {
  const anki = loadAnki();
  const now = Date.now();

  const newCards = [];
  const dueCards = [];

  available.forEach(({ sentence: s, src }) => {
    availableMap[s.id] = src;
    const c = anki[s.id];
    if (!c || c.interval === 0) {
      newCards.push(s);
    } else if (c.due <= now) {
      dueCards.push(s);
    }
  });

  shuffle(newCards);
  shuffle(dueCards);
  queue = [...dueCards, ...newCards];
  sessionDone = 0;
  againQueue = [];

  updateStats(available.length);
}

function updateStats(total) {
  const anki = loadAnki();
  const now = Date.now();
  let newCount = 0, dueCount = 0;

  Object.values(availableMap).length; // just using availableMap keys
  Object.keys(availableMap).forEach(id => {
    const c = anki[id];
    if (!c || c.interval === 0) newCount++;
    else if (c.due <= now) dueCount++;
  });

  document.getElementById('stat-new').textContent = newCount;
  document.getElementById('stat-due').textContent = dueCount;
  document.getElementById('stat-done').textContent = sessionDone;
  document.getElementById('header-info').textContent = `${Object.keys(availableMap).length} cards`;

  const total2 = queue.length + againQueue.length + sessionDone;
  document.getElementById('progress').style.width =
    total2 > 0 ? (sessionDone / total2 * 100) + '%' : '0%';
}

// ── Card rendering ────────────────────────────────────────
let triedJpg = false;

function nextCard() {
  // Pull from againQueue first if they've waited, else main queue
  if (queue.length === 0 && againQueue.length === 0) {
    showDone();
    return;
  }

  current = queue.length > 0 ? queue.shift() : againQueue.shift();
  showCard(current);
}

function showCard(s) {
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('scene').style.display = 'block';
  document.getElementById('done-screen').style.display = 'none';

  // Update interval labels
  const iv = previewIntervals(s.id);
  document.getElementById('lbl-again').textContent = 'soon';
  document.getElementById('lbl-good').textContent = iv.isNew ? '10m' : fmtInterval(iv.good);
  document.getElementById('lbl-easy').textContent = iv.isNew ? '1d' : fmtInterval(iv.easy);

  // Image
  triedJpg = false;
  const src = availableMap[s.id];
  const frontImg = document.getElementById('front-img');
  frontImg.style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('placeholder').style.display = 'none';

  if (src) {
    frontImg.src = src;
    document.getElementById('back-img').src = src;
  } else {
    document.getElementById('placeholder').style.display = 'flex';
  }

  document.getElementById('back-french').textContent = s.fr;
  document.getElementById('back-english').textContent = s.en;
  document.getElementById('speak-btn').classList.remove('speaking');

  updateStats();
}

function imgLoaded() {
  document.getElementById('front-img').style.display = 'block';
  document.getElementById('overlay').style.display = 'block';
}

function imgError() {
  if (!triedJpg) {
    triedJpg = true;
    const s = current;
    document.getElementById('front-img').src = `images/${toSlug(s.en)}.jpg`;
  } else {
    document.getElementById('placeholder').style.display = 'flex';
  }
}

function flipCard() {
  document.getElementById('card').classList.toggle('flipped');
}

function rate(rating) {
  if (!current) return;
  const next = calcNext(current.id, rating);
  const anki = loadAnki();
  anki[current.id] = next;
  saveAnki(anki);

  if (rating === 'again') {
    // Re-insert after a few cards, not immediately
    const pos = Math.min(3, queue.length);
    queue.splice(pos, 0, current);
  } else {
    sessionDone++;
  }

  nextCard();
}

function showDone() {
  document.getElementById('scene').style.display = 'none';
  document.getElementById('done-screen').style.display = 'flex';
  document.getElementById('done-msg').textContent =
    `You reviewed ${sessionDone} card${sessionDone !== 1 ? 's' : ''} this session.`;
}

function restartSession() {
  const available = Object.keys(availableMap).map(id => ({
    sentence: SENTENCES.find(s => s.id == id),
    src: availableMap[id]
  }));
  buildQueue(available);
  document.getElementById('done-screen').style.display = 'none';
  nextCard();
}

function speak() {
  if (!current) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(current.fr);
  utter.lang = 'fr-FR';
  utter.rate = 0.9;
  const btn = document.getElementById('speak-btn');
  btn.classList.add('speaking');
  utter.onend = () => btn.classList.remove('speaking');
  utter.onerror = () => btn.classList.remove('speaking');
  window.speechSynthesis.speak(utter);
}

// ── Init ──────────────────────────────────────────────────
(async () => {
  const available = await detectAvailable();
  document.getElementById('loading-screen').style.display = 'none';

  if (available.length === 0) {
    document.getElementById('loading-screen').style.display = 'flex';
    document.getElementById('loading-screen').innerHTML =
      '<span style="font-size:48px">🖼️</span><span>No images found in the images/ folder yet.</span>';
    return;
  }

  buildQueue(available);
  nextCard();
})();
</script>
