<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French Cards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: sans-serif;
    background: #111;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }

  header {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  header a {
    color: #888;
    font-size: 13px;
    text-decoration: none;
  }

  header a:hover { color: #fff; }

  .counter {
    font-size: 13px;
    color: #888;
  }

  .progress-bar {
    width: 100%;
    max-width: 480px;
    height: 3px;
    background: #333;
    border-radius: 2px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: #4caf50;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Card scene */
  .scene {
    width: 100%;
    max-width: 480px;
    height: 420px;
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 24px;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  /* Front face */
  .front {
    background: #1a1a1a;
    border: 1px solid #333;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 16px;
    display: block;
  }

  .front .img-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.7) 100%);
    border-radius: 16px;
  }

  .front .tap-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.4);
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .front .speak-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    background: rgba(0,0,0,0.5);
    border: none;
    color: #fff;
    font-size: 22px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    transition: background 0.2s;
  }

  .front .speak-btn:hover { background: rgba(0,0,0,0.75); }
  .front .speak-btn.speaking { background: #0055cc; }

  /* Loading state on front */
  .img-loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #666;
    font-size: 13px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #333;
    border-top-color: #4caf50;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Back face */
  .back {
    background: #1a1a1a;
    border: 1px solid #333;
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
  }

  .back img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 16px 16px 0 0;
    display: block;
    flex-shrink: 0;
  }

  .back .text-area {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 10px;
  }

  .back .french {
    font-size: 20px;
    font-weight: bold;
    color: #fff;
    line-height: 1.35;
  }

  .back .english {
    font-size: 14px;
    color: #aaa;
    line-height: 1.4;
  }

  .back .actions {
    display: flex;
    gap: 8px;
    padding: 0 20px 20px;
  }

  .back .actions button {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .back .actions button:hover { opacity: 0.85; }

  .btn-again { background: #444; color: #fff; }
  .btn-got-it { background: #4caf50; color: #fff; }

  /* Navigation */
  .nav {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 480px;
    justify-content: center;
  }

  .nav button {
    background: #222;
    border: 1px solid #444;
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .nav button:hover { background: #333; }
  .nav button:disabled { opacity: 0.3; cursor: default; }

  .nav .num {
    font-size: 14px;
    color: #666;
    min-width: 60px;
    text-align: center;
  }

  /* Done screen */
  .done {
    text-align: center;
    padding: 60px 20px;
  }

  .done h2 { font-size: 28px; margin-bottom: 8px; }
  .done p { color: #888; font-size: 14px; margin-bottom: 24px; }
  .done a {
    display: inline-block;
    padding: 10px 24px;
    background: #4caf50;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <a href="index.html">← Back to list</a>
  <span class="counter" id="counter"></span>
</header>

<div class="progress-bar">
  <div class="progress-fill" id="progress"></div>
</div>

<div class="scene" id="scene" onclick="flipCard()">
  <div class="card" id="card">

    <!-- Front -->
    <div class="face front" id="front">
      <div class="img-loading" id="loading">
        <div class="spinner"></div>
        <span>Generating image…</span>
      </div>
      <img id="front-img" src="" alt="" style="display:none" onload="imgLoaded()" onerror="imgError()">
      <div class="img-overlay" id="overlay" style="display:none"></div>
      <div class="tap-hint" id="tap-hint" style="display:none">Tap to reveal</div>
      <button class="speak-btn" id="speak-btn" onclick="event.stopPropagation(); speak()" style="display:none">🔊</button>
    </div>

    <!-- Back -->
    <div class="face back" id="back">
      <img id="back-img" src="" alt="">
      <div class="text-area">
        <div class="french" id="back-french"></div>
        <div class="english" id="back-english"></div>
      </div>
      <div class="actions">
        <button class="btn-again" onclick="event.stopPropagation(); markAgain()">🔁 Again</button>
        <button class="btn-got-it" onclick="event.stopPropagation(); markGotIt()">✓ Got it</button>
      </div>
    </div>

  </div>
</div>

<div class="nav">
  <button id="btn-prev" onclick="go(-1)">← Prev</button>
  <span class="num" id="nav-num"></span>
  <button id="btn-next" onclick="go(1)">Next →</button>
</div>

let index = 0;
let isFlipped = false;
let imgUrl = '';

function imageUrl(sentence) {
  const prompt = encodeURIComponent(
    sentence.en + ', simple illustration, flat design, colorful, no text'
  );
  return `https://image.pollinations.ai/prompt/${prompt}?width=480&height=420&nologo=true&seed=${sentence.id}`;
}

function loadCard() {
  const s = SENTENCES[index];
  isFlipped = false;

  const card = document.getElementById('card');
  card.classList.remove('flipped');

  // Reset front
  const frontImg = document.getElementById('front-img');
  frontImg.style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('tap-hint').style.display = 'none';
  document.getElementById('speak-btn').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';

  // Load image
  imgUrl = imageUrl(s);
  frontImg.src = imgUrl;

  // Back
  document.getElementById('back-img').src = imgUrl;
  document.getElementById('back-french').textContent = s.fr;
  document.getElementById('back-english').textContent = s.en;

  // Counter
  document.getElementById('counter').textContent = `${index + 1} / ${SENTENCES.length}`;
  document.getElementById('nav-num').textContent = `${index + 1} / ${SENTENCES.length}`;
  document.getElementById('progress').style.width = ((index + 1) / SENTENCES.length * 100) + '%';

  document.getElementById('btn-prev').disabled = index === 0;
  document.getElementById('btn-next').disabled = index === SENTENCES.length - 1;
}

function imgLoaded() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('front-img').style.display = 'block';
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('tap-hint').style.display = 'block';
  document.getElementById('speak-btn').style.display = 'flex';
  // Auto-play voice when image loads
  speak();
}

function imgError() {
  document.getElementById('loading').innerHTML = '<span style="font-size:48px">🖼️</span><span>Image unavailable</span>';
  document.getElementById('tap-hint').style.display = 'block';
  document.getElementById('speak-btn').style.display = 'flex';
  speak();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
}

function speak() {
  const s = SENTENCES[index];
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(s.fr);
  utter.lang = 'fr-FR';
  utter.rate = 0.9;
  const btn = document.getElementById('speak-btn');
  btn.classList.add('speaking');
  utter.onend = () => btn.classList.remove('speaking');
  utter.onerror = () => btn.classList.remove('speaking');
  window.speechSynthesis.speak(utter);
}

function go(dir) {
  window.speechSynthesis.cancel();
  index = Math.max(0, Math.min(SENTENCES.length - 1, index + dir));
  loadCard();
}

function markGotIt() {
  if (index < SENTENCES.length - 1) go(1);
}

function markAgain() {
  // Flip back to front to review again
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  speak();
}

loadCard();
</script>
