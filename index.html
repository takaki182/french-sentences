<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French Sentences</title>
<style>
  body {
    font-family: sans-serif;
    max-width: 620px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    background: #f0f0f0;
    color: #000;
  }

  h1 { font-size: 22px; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #555; margin-bottom: 6px; }
  .hint { font-size: 12px; color: #888; margin-bottom: 20px; background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 8px 12px; }

  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
  }

  .stat-box {
    flex: 1;
    background: #fff;
    border: 1.5px solid #bbb;
    border-radius: 6px;
    padding: 8px 12px;
    text-align: center;
  }

  .stat-box .stat-num { font-size: 20px; font-weight: bold; display: block; }
  .stat-box .stat-label { font-size: 11px; color: #666; }
  .stat-box.green-box { border-color: #5a9e5a; background: #edfaed; }
  .stat-box.green-box .stat-num { color: #2d7a2d; }

  .progress-bar { height: 5px; background: #bbb; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: #000; border-radius: 3px; transition: width 0.3s; width: 0%; }

  .search input {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid #999;
    border-radius: 4px;
    font-size: 14px;
    margin-bottom: 10px;
    outline: none;
    box-sizing: border-box;
    background: #fff;
    color: #000;
  }

  .search input:focus { border-color: #000; }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .filter-btn {
    padding: 6px 14px;
    border: 1.5px solid #999;
    border-radius: 20px;
    background: #fff;
    font-size: 12px;
    cursor: pointer;
    color: #333;
  }

  .filter-btn.active { background: #000; color: #fff; border-color: #000; }
  .filter-btn.green-filter.active { background: #2d7a2d; border-color: #2d7a2d; color: #fff; }

  /* Card wrapper for swipe */
  .card-wrapper {
    position: relative;
    margin-bottom: 6px;
    overflow: hidden;
    border-radius: 6px;
  }

  /* Swipe indicator behind card */
  .swipe-bg {
    position: absolute;
    inset: 0;
    background: #4caf50;
    display: flex;
    align-items: center;
    padding-left: 20px;
    font-size: 20px;
    color: #fff;
    font-weight: bold;
    border-radius: 6px;
  }

  .sentence-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 12px;
    background: #fff;
    border: 1.5px solid #bbb;
    border-radius: 6px;
    position: relative;
    touch-action: pan-y;
    user-select: none;
    transition: transform 0.15s ease, background 0.3s;
    cursor: grab;
  }

  .sentence-item.mastered {
    background: #edfaed;
    border-color: #5a9e5a;
  }

  .sentence-item.learned {
    background: #e8e8e8;
    border-color: #999;
  }

  .sentence-item.mastered.learned {
    background: #edfaed;
    border-color: #5a9e5a;
  }

  .num { font-size: 12px; color: #555; min-width: 24px; padding-top: 3px; font-weight: bold; }
  .content { flex: 1; }
  .french { font-size: 17px; font-weight: bold; color: #000; margin-bottom: 3px; }
  .english { font-size: 13px; color: #444; }

  .sentence-item.learned .french { text-decoration: line-through; color: #888; }
  .sentence-item.learned .english { color: #888; }
  .sentence-item.mastered .french { color: #1a5c1a; }
  .sentence-item.mastered.learned .french { text-decoration: line-through; color: #5a9e5a; }

  /* Mastered badge */
  .mastered-badge {
    font-size: 11px;
    color: #2d7a2d;
    font-weight: bold;
    margin-top: 2px;
    display: none;
  }

  .sentence-item.mastered .mastered-badge { display: block; }

  .btns { display: flex; gap: 6px; padding-top: 2px; }

  .btn-learn, .btn-del, .btn-speak {
    border: 1.5px solid #999;
    background: #fff;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 13px;
    cursor: pointer;
    color: #333;
  }

  .btn-learn:hover { border-color: #000; color: #000; background: #eee; }
  .btn-del:hover { border-color: #c00; color: #c00; }
  .btn-speak:hover { border-color: #0055cc; color: #0055cc; }
  .btn-speak.speaking { background: #0055cc; color: #fff; border-color: #0055cc; }
  .sentence-item.learned .btn-learn { background: #000; color: #fff; border-color: #000; }

  .empty { text-align: center; padding: 40px 0; color: #666; font-size: 14px; }
</style>
</head>
<body>

<h1>🇫🇷 French Sentences</h1>
<div class="subtitle">Swipe right on a card to mark it as learning 💚</div>
<div class="hint">👉 Swipe right → Learning (green) &nbsp;|&nbsp; ✓ Learned &nbsp;|&nbsp; 🔊 Listen &nbsp;|&nbsp; ✕ Delete</div>

<div class="stats-row">
  <div class="stat-box">
    <span class="stat-num" id="stat-total">0</span>
    <span class="stat-label">Total</span>
  </div>
  <div class="stat-box">
    <span class="stat-num" id="stat-learned">0</span>
    <span class="stat-label">Learned ✓</span>
  </div>
  <div class="stat-box green-box">
    <span class="stat-num" id="stat-mastered">0</span>
    <span class="stat-label">Learning 💚</span>
  </div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="search">
  <input type="text" id="search" placeholder="Search…" oninput="render()">
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('learned', this)">Learned ✓</button>
  <button class="filter-btn green-filter" onclick="setFilter('mastered', this)">Learning 💚</button>
  <button class="filter-btn" onclick="setFilter('remaining', this)">Remaining</button>
</div>

<div id="list"></div>
<div class="empty" id="empty" style="display:none">No sentences found.</div>

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; }
  catch { return []; }
}

function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

(function sync() {
  const d = load();
  const ids = new Set(d.map(x => x.id));
  MASTER.forEach(m => {
    if (!ids.has(m.id)) d.push({ ...m, learned: false, mastered: false });
  });
  d.forEach(x => { if (x.mastered === undefined) x.mastered = false; });
  d.sort((a, b) => a.id - b.id);
  save(d);
})();

function toggleLearned(id) {
  const d = load();
  const item = d.find(x => x.id === id);
  if (item) { item.learned = !item.learned; save(d); render(); }
}

function toggleMastered(id) {
  const d = load();
  const item = d.find(x => x.id === id);
  if (item) { item.mastered = !item.mastered; save(d); render(); }
}

function deleteSentence(id) {
  if (!confirm('Delete this sentence?')) return;
  save(load().filter(x => x.id !== id));
  render();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const d = load();
  const q = document.getElementById('search').value.toLowerCase();

  let filtered = d.filter(x => !q || x.fr.toLowerCase().includes(q) || x.en.toLowerCase().includes(q));
  if (currentFilter === 'learned') filtered = filtered.filter(x => x.learned);
  if (currentFilter === 'mastered') filtered = filtered.filter(x => x.mastered);
  if (currentFilter === 'remaining') filtered = filtered.filter(x => !x.learned && !x.mastered);

  const total = d.length;
  const learned = d.filter(x => x.learned).length;
  const mastered = d.filter(x => x.mastered).length;
  const pct = total ? Math.round((learned + mastered) / (total * 2) * 100) : 0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-learned').textContent = learned;
  document.getElementById('stat-mastered').textContent = mastered;
  document.getElementById('progress').style.width = pct + '%';

  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  list.innerHTML = '';

  if (filtered.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  filtered.forEach((x, i) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper';

    const bg = document.createElement('div');
    bg.className = 'swipe-bg';
    bg.innerHTML = x.mastered ? '💚 Learning!' : '💚 Mark as Learning!';

    const el = document.createElement('div');
    let cls = 'sentence-item';
    if (x.mastered) cls += ' mastered';
    if (x.learned) cls += ' learned';
    el.className = cls;

    el.innerHTML = `
      <div class="num">${i + 1}</div>
      <div class="content">
        <div class="french">${esc(x.fr)}</div>
        ${x.en ? `<div class="english">${esc(x.en)}</div>` : ''}
        <div class="mastered-badge">💚 Learning</div>
      </div>
      <div class="btns">
        <button class="btn-speak" onclick="speak(this, ${x.id})">🔊</button>
        <button class="btn-learn" onclick="toggleLearned(${x.id})">✓</button>
        <button class="btn-del" onclick="deleteSentence(${x.id})">✕</button>
      </div>
    `;

    wrapper.appendChild(bg);
    wrapper.appendChild(el);
    list.appendChild(wrapper);

    // Swipe logic
    let startX = 0, startY = 0, dragging = false;
    const THRESHOLD = 80;

    function onStart(clientX, clientY) {
      startX = clientX;
      startY = clientY;
      dragging = true;
      el.style.transition = 'none';
    }

    function onMove(clientX, clientY) {
      if (!dragging) return;
      const dx = clientX - startX;
      const dy = Math.abs(clientY - startY);
      if (dy > 30) { dragging = false; el.style.transform = ''; return; }
      if (dx > 0) el.style.transform = `translateX(${Math.min(dx, 120)}px)`;
    }

    function onEnd(clientX) {
      if (!dragging) return;
      dragging = false;
      const dx = clientX - startX;
      el.style.transition = 'transform 0.3s ease';
      el.style.transform = '';
      if (dx > THRESHOLD) toggleMastered(x.id);
    }

    el.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    el.addEventListener('touchmove', e => onMove(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    el.addEventListener('touchend', e => onEnd(e.changedTouches[0].clientX));

    el.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => { if (dragging) onMove(e.clientX, e.clientY); });
    window.addEventListener('mouseup', e => { if (dragging) onEnd(e.clientX); });
  });
}

function speak(btn, id) {
  const d = load();
  const item = d.find(x => x.id === id);
  if (!item) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(item.fr);
  utter.lang = 'fr-FR';
  utter.rate = 0.9;
  btn.classList.add('speaking');
  utter.onend = () => btn.classList.remove('speaking');
  utter.onerror = () => btn.classList.remove('speaking');
  window.speechSynthesis.speak(utter);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
}

render();
</script>
</body>
</html>
